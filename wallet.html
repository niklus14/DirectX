<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unified Wallet · AZCON DirectX</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #061014; --panel: rgba(11,29,38,0.7);
  --accent: #3AE2CE; --accent2: #FF6B2B; --gold: #F0B429;
  --white: #fff; --ink2: #8EA7B4; --ink3: #5C7A8B;
  --border: rgba(255,255,255,0.06);
  --f-disp: 'Bebas Neue',sans-serif;
  --f-mono: 'Space Mono',monospace;
  --f-body: 'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{font-family:var(--f-body);background:radial-gradient(circle at 40% 30%,#0F2A36,var(--bg) 70%);color:var(--white);display:flex}

/* SIDEBAR */
aside{width:240px;min-width:240px;background:rgba(6,16,20,.9);backdrop-filter:blur(20px);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 20px;height:100vh;position:sticky;top:0}
.logo{font-family:var(--f-body);font-weight:700;font-size:26px;letter-spacing:-0.02em;margin-bottom:28px;cursor:pointer}
.logo span{color:var(--accent)}
.nav-item{padding:11px 16px;margin-bottom:6px;border-radius:10px;color:var(--ink2);font-weight:500;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:.2s}
.nav-item svg{width:16px;height:16px;opacity:.7;flex-shrink:0}
.nav-item:hover{background:rgba(58,226,206,.08);color:var(--accent)}
.nav-item.active{background:rgba(58,226,206,.12);color:var(--accent);border:1px solid rgba(58,226,206,.2)}
.nav-item.active svg{opacity:1}
.sign-out{color:var(--accent2)!important;margin-top:auto}

/* MAIN */
main{flex:1;display:flex;flex-direction:column;padding:40px 60px}
.top-bar{margin-bottom:40px}
.page-eyebrow{font-family:var(--f-mono);font-size:11px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
.page-title{font-family:var(--f-disp);font-size:38px;letter-spacing:.04em}

/* WALLET CARDS */
.wallet-container { display: flex; gap: 30px; margin-bottom: 40px; }
.balance-card { 
  background: linear-gradient(135deg, rgba(58, 226, 206, 0.1) 0%, rgba(11,29,38,0.8) 100%);
  border: 1px solid rgba(58,226,206,0.3);
  border-radius: 20px; padding: 30px; flex: 1;
  box-shadow: 0 10px 40px rgba(58, 226, 206, 0.05);
  display: flex; flex-direction: column; justify-content: center;
}
.balance-label { font-family: var(--f-mono); font-size: 12px; color: var(--ink2); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
.balance-amount { font-family: var(--f-disp); font-size: 64px; color: var(--accent); letter-spacing: 0.02em; line-height: 1; text-shadow: 0 0 20px rgba(58,226,206,0.3); }
.balance-currency { font-size: 32px; color: var(--white); margin-left: 8px; }

.actions-card {
  display: flex; flex-direction: column; gap: 16px; justify-content: center; width: 300px;
}
.btn {
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 20px; font-family: var(--f-body); font-weight: 600; font-size: 14px;
  color: var(--white); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-primary { background: var(--accent); color: var(--bg); border: none; }
.btn-primary:hover { background: #2dcfbb; box-shadow: 0 0 20px rgba(58,226,206,0.4); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }

/* TRANSACTIONS */
.section-title { font-family: var(--f-disp); font-size: 24px; letter-spacing: 0.05em; margin-bottom: 20px; color: var(--white); }
.tx-list { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
.tx-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border); }
.tx-item:last-child { border-bottom: none; }
.tx-info { display: flex; align-items: center; gap: 16px; }
.tx-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; }
.tx-icon svg { width: 20px; height: 20px; color: var(--ink2); }
.tx-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
.tx-date { font-size: 12px; color: var(--ink3); font-family: var(--f-mono); }
.tx-amount { font-weight: 700; font-size: 16px; font-family: var(--f-mono); }
.tx-positive { color: #10B981; }
.tx-negative { color: var(--white); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 100; opacity: 0; transition: 0.3s; }
.modal-overlay.active { display: flex; opacity: 1; }
.modal { background: #0B1D26; border: 1px solid var(--border); border-radius: 24px; padding: 40px; width: 400px; max-width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.5); transform: translateY(20px); transition: 0.3s; }
.modal-overlay.active .modal { transform: translateY(0); }
.modal-title { font-family: var(--f-disp); font-size: 28px; letter-spacing: 0.05em; margin-bottom: 24px; }
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 12px; color: var(--ink2); margin-bottom: 8px; font-family: var(--f-mono); text-transform: uppercase; letter-spacing: 0.1em; }
.form-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; color: var(--white); font-family: var(--f-mono); font-size: 14px; outline: none; transition: 0.2s; }
.form-input:focus { border-color: var(--accent); }
.row { display: flex; gap: 16px; }
.modal-actions { display: flex; gap: 16px; margin-top: 30px; }
.modal-actions .btn { flex: 1; }

.qr-placeholder { background: rgba(255,255,255,0.05); width: 200px; height: 200px; margin: 0 auto 24px; border-radius: 16px; display: flex; align-items: center; justify-content: center; border: 2px dashed var(--accent); position: relative; overflow: hidden; }
.qr-scanner-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: scan 2s linear infinite; }
@keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

</style>
</head>
<body>

<aside>
  <div class="logo" onclick="location.href='azcon-one.html'">Direct<span>X</span></div>
  <div class="nav-item" onclick="location.href='azcon-one.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Ecosystem
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
    Smart Route
  </div>
  <div class="nav-item" onclick="location.href='azal-flights.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 19-7z"/></svg>
    Transit &amp; Flights
  </div>
  <div class="nav-item" onclick="location.href='esim.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/></svg>
    eSIM Services
  </div>
  <div class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg>
    Unified Wallet
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    Tracing Intelligence
  </div>
  <div class="nav-item sign-out">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Sign Out
  </div>
</aside>

<main>
  <div class="top-bar">
    <div class="page-eyebrow">Finance & Payments</div>
    <div class="page-title">Unified Wallet</div>
  </div>

  <div class="wallet-container">
    <div class="balance-card">
      <div class="balance-label">Total Balance</div>
      <div>
        <span class="balance-amount" id="balance-display">0.00</span>
        <span class="balance-currency">AZN</span>
      </div>
    </div>
    
    <div class="actions-card">
      <button class="btn btn-primary" onclick="openModal('add-modal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Top Up Balance
      </button>
      <button class="btn btn-outline" onclick="openModal('qr-modal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Pay with QR (Transport)
      </button>
    </div>
  </div>

  <div class="section-title">Recent Transactions</div>
  <div class="tx-list" id="tx-list">
    <!-- Transactions rendered here -->
  </div>
</main>

<!-- ADD BALANCE MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-title">Top Up Balance</div>
    <div class="form-group">
      <label class="form-label">Card Number</label>
      <input type="text" class="form-input" placeholder="0000 0000 0000 0000" maxlength="19">
    </div>
    <div class="row">
      <div class="form-group" style="flex:1">
        <label class="form-label">Expiry</label>
        <input type="text" class="form-input" placeholder="MM/YY" maxlength="5">
      </div>
      <div class="form-group" style="flex:1">
        <label class="form-label">CVV</label>
        <input type="password" class="form-input" placeholder="123" maxlength="3">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Amount (AZN)</label>
      <input type="number" class="form-input" id="topup-amount" placeholder="0.00" min="1">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="handleAddBalance()">Confirm</button>
    </div>
  </div>
</div>

<!-- QR PAYMENT MODAL -->
<div class="modal-overlay" id="qr-modal">
  <div class="modal" style="text-align: center;">
    <div class="modal-title">Transport QR Scanner</div>
    <div class="qr-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--ink2)" stroke-width="1.5" width="48" height="48"><path d="M4 4h4v4H4zM16 4h4v4h-4zM4 16h4v4H4zM16 16h4v4h-4zM9 4v4M15 4v4M9 16v4M15 16v4M4 9h16M4 15h16"/></svg>
      <div class="qr-scanner-line"></div>
    </div>
    <p style="color:var(--ink2);font-size:14px;margin-bottom:24px">Align the metro or bus QR code within the frame to pay 1.00 AZN.</p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('qr-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="handleQRPayment()">Simulate Scan</button>
    </div>
  </div>
</div>

<script>
  // Initialize state
  function initWallet() {
    let bal = localStorage.getItem('azcon_wallet_balance');
    if (!bal) {
      bal = 1500.00;
      localStorage.setItem('azcon_wallet_balance', bal);
      localStorage.setItem('azcon_wallet_txs', JSON.stringify([
        { id: Date.now().toString(), title: 'Initial Deposit', date: new Date().toISOString(), amount: 1500, type: 'credit' }
      ]));
    }
    updateUI();
  }

  function getBalance() { return parseFloat(localStorage.getItem('azcon_wallet_balance') || 0); }
  function getTxs() { return JSON.parse(localStorage.getItem('azcon_wallet_txs') || '[]'); }

  function addTx(title, amount, type) {
    let bal = getBalance();
    if (type === 'debit') bal -= amount;
    else bal += amount;
    
    localStorage.setItem('azcon_wallet_balance', bal.toFixed(2));
    
    const txs = getTxs();
    txs.unshift({ id: Date.now().toString(), title, amount, type, date: new Date().toISOString() });
    localStorage.setItem('azcon_wallet_txs', JSON.stringify(txs));
    
    updateUI();
  }

  function updateUI() {
    document.getElementById('balance-display').textContent = getBalance().toFixed(2);
    
    const list = document.getElementById('tx-list');
    const txs = getTxs();
    
    if (txs.length === 0) {
      list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--ink3)">No transactions yet.</div>';
      return;
    }

    list.innerHTML = txs.map(tx => {
      const isCredit = tx.type === 'credit';
      const icon = isCredit 
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg>';
      
      const date = new Date(tx.date).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
      
      return `
        <div class="tx-item">
          <div class="tx-info">
            <div class="tx-icon">${icon}</div>
            <div>
              <div class="tx-title">${tx.title}</div>
              <div class="tx-date">${date}</div>
            </div>
          </div>
          <div class="tx-amount ${isCredit ? 'tx-positive' : 'tx-negative'}">
            ${isCredit ? '+' : '-'}${parseFloat(tx.amount).toFixed(2)} AZN
          </div>
        </div>
      `;
    }).join('');
  }

  // Modals
  function openModal(id) { document.getElementById(id).classList.add('active'); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }

  function handleAddBalance() {
    const amt = parseFloat(document.getElementById('topup-amount').value);
    if (!amt || amt <= 0) return alert('Enter a valid amount.');
    addTx('Card Top Up', amt, 'credit');
    closeModal('add-modal');
    document.getElementById('topup-amount').value = '';
  }

  function handleQRPayment() {
    if (getBalance() < 1.00) return alert('Insufficient balance.');
    addTx('Metro Ride Payment', 1.00, 'debit');
    closeModal('qr-modal');
  }

  window.addEventListener('load', initWallet);
</script>
</body>
</html>
