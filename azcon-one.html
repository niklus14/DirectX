<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZCON DirectX · Ecosystem Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --sky: #0B1D26;
    --sky-mid: #153243;
    --sky-deep: #1F455A;
    --ink: #FFFFFF;
    --ink-2: #8EA7B4;
    --ink-3: #5C7A8B;
    --accent: #3AE2CE;
    --accent-2: #FF6B2B;
    --gold: #F0B429;
    --white: #FFFFFF;
    --dark-bg: #061014;
    --panel-bg: rgba(11, 29, 38, 0.6);
    --font-disp: 'Bebas Neue', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }
  
  body {
    margin: 0; padding: 0;
    font-family: var(--font-body);
    background: radial-gradient(circle at 50% 50%, #0F2A36 0%, var(--dark-bg) 80%);
    background-color: var(--dark-bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    overflow-x: hidden;
  }
  
  /* Sidebar */
  .sidebar {
    width: 260px;
    background: rgba(6, 16, 20, 0.85);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    padding: 30px;
    box-shadow: 4px 0 20px rgba(0,0,0,0.5);
    z-index: 10;
  }
  
  .logo {
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 30px;
    cursor: pointer;
  }
  .logo span { color: var(--accent); }
  
  .nav-item {
    padding: 14px 20px;
    margin-bottom: 8px;
    border-radius: 10px;
    color: var(--ink-2);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .nav-item svg {
    width: 18px; height: 18px;
    opacity: 0.7;
  }
  .nav-item:hover {
    background: var(--sky);
    color: var(--accent);
  }
  .nav-item:hover svg { opacity: 1; }
  
  .nav-item.active {
    background: rgba(58, 226, 206, 0.1);
    color: var(--accent);
    border: 1px solid rgba(58, 226, 206, 0.2);
  }
  .nav-item.active svg { opacity: 1; color: var(--accent); }
  
  /* Main Content */
  .main-content {
    flex: 1;
    padding: 30px 40px;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  
  .header {
    margin-bottom: 30px;
    animation: fadeDown 0.6s ease-out;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .title {
    font-family: var(--font-disp);
    font-size: 40px;
    margin: 0;
    line-height: 1.1;
    letter-spacing: 0.04em;
    color: var(--ink);
  }
  
  /* Diagram Container */
  .diagram-container {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border-radius: 24px;
    padding: 30px;
    animation: fadeUp 0.8s ease-out 0.2s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .nodes-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: auto auto auto;
    row-gap: 50px;
    column-gap: 40px;
    width: 100%;
    max-width: 860px;
    position: relative;
    z-index: 2;
  }
  
  .node-cell {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  
  .top-left { grid-column: 1; grid-row: 1; }
  .top-center { grid-column: 2; grid-row: 1; }
  .top-right { grid-column: 3; grid-row: 1; }
  
  .mid-center { grid-column: 2; grid-row: 2; }
  
  .bot-left { grid-column: 1; grid-row: 3; }
  .bot-right { grid-column: 3; grid-row: 3; }
  
  .node {
    background: var(--panel-bg);
    padding: 16px 24px;
    border-radius: 16px;
    font-weight: 500;
    font-size: 14px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.05);
    min-width: 140px;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-color 0.4s ease;
    cursor: default;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    backdrop-filter: blur(12px);
  }
  .node:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 16px 40px rgba(58, 226, 206, 0.15);
    border-color: rgba(58, 226, 206, 0.4);
  }
  
  .node-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.03);
  }
  .node-icon svg { width: 18px; height: 18px; color: var(--ink-2); }
  
  .node:hover .node-icon svg { color: var(--accent); }
  
  /* Specific Node Colors override */
  #node-azal:hover .node-icon svg { color: var(--accent); }
  #node-sr:hover .node-icon svg { color: #10B981; }
  #node-esim:hover .node-icon svg { color: var(--accent-2); }
  #node-ti:hover .node-icon svg { color: #8B5CF6; }
  #node-wallet:hover .node-icon svg { color: #D97706; }
  
  /* Center Node */
  .node.center {
    background: rgba(6, 16, 20, 0.8);
    border: 1px solid rgba(58, 226, 206, 0.5);
    min-width: 180px;
    padding: 20px 32px;
    box-shadow: 0 0 40px rgba(58, 226, 206, 0.2), inset 0 0 20px rgba(58, 226, 206, 0.05);
  }
  .node.center .node-icon {
    background: rgba(58, 226, 206, 0.1);
    color: var(--accent);
    width: 44px; height: 44px;
    border-radius: 12px;
  }
  .node.center .node-icon svg { color: var(--accent); }
  .node.center:hover {
    transform: translateY(-8px) scale(1.05);
    box-shadow: 0 0 60px rgba(58, 226, 206, 0.4), inset 0 0 30px rgba(58, 226, 206, 0.1);
    border-color: var(--accent);
  }
  .center-title {
    font-family: var(--font-disp);
    font-size: 24px;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-shadow: 0 0 10px rgba(58, 226, 206, 0.5);
  }
  
  /* SVG Layer */
  .svg-layer {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }
  
  /* Flow Animation */
  .flow-line {
    stroke-dasharray: 10;
    animation: flow 1.5s linear infinite;
  }
  @keyframes flow {
    to { stroke-dashoffset: -20; }
  }
</style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo" onclick="window.location.href='directx-dashboard.html'">Direct<span>X</span></div>
    
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Ecosystem
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
      Smart Route
    </div>
    <div class="nav-item" onclick="location.href='azal-flights.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 19-7z"/></svg>
      Transit & Flights
    </div>
    <div class="nav-item" onclick="location.href='esim.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/></svg>
      eSIM Services
    </div>
    <div class="nav-item" onclick="location.href='wallet.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg>
      Unified Wallet
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      Tracing Intelligence
    </div>
    
    <div style="margin-top: auto;">
      <div class="nav-item" style="color: var(--accent-2);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="header">
      <div class="eyebrow">Dashboard Overview</div>
      <h1 class="title">AI-Powered Travel Ecosystem</h1>
    </div>
    
    <div class="diagram-container" id="diagram-container">
      <svg class="svg-layer" id="svg-layer"></svg>
      
      <div class="nodes-grid">
        <!-- Top Row -->
        <div class="node-cell top-left">
          <div class="node" id="node-sr">
            <div class="node-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
            </div>
            Smart Route
          </div>
        </div>
        
        <div class="node-cell top-center">
          <div class="node" id="node-azal" onclick="location.href='azal-flights.html'" style="cursor:pointer">
            <div class="node-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 19-7z"/></svg>
            </div>
            AZAL
          </div>
        </div>
        
        <div class="node-cell top-right">
          <div class="node" id="node-esim">
            <div class="node-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/></svg>
            </div>
            eSIM
          </div>
        </div>
        
        <!-- Middle Row -->
        <div class="node-cell mid-center">
          <div class="node center" id="node-dx" onclick="location.href='directx-ai.html'" style="cursor:pointer">
            <div class="node-icon">
              <!-- AI Brain / Network Icon -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 12L2.5 7.5"/><path d="M12 12l9.5-4.5"/><path d="M12 12v10"/></svg>
            </div>
            <div class="center-title">DirectX AI</div>
          </div>
        </div>
        
        <!-- Bottom Row -->
        <div class="node-cell bot-left">
          <div class="node" id="node-ti">
            <div class="node-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
            </div>
            Tracing Intelligence
          </div>
        </div>
        
        <div class="node-cell bot-right">
          <div class="node" id="node-wallet">
            <div class="node-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/><path d="M16 14h.01"/></svg>
            </div>
            Wallet
          </div>
        </div>
      </div>
    </div>
  </main>

<script>
  function drawLines() {
    const svg = document.getElementById('svg-layer');
    if (!svg) return;
    svg.innerHTML = ''; 
    const cRect = document.getElementById('diagram-container').getBoundingClientRect();
    
    function getPt(id, edge) {
      const el = document.getElementById(id);
      if (!el) return {x:0, y:0};
      const rect = el.getBoundingClientRect();
      let x = rect.left - cRect.left;
      let y = rect.top - cRect.top;
      if (edge === 'bottom') { x += rect.width/2; y += rect.height; }
      if (edge === 'top') { x += rect.width/2; }
      if (edge === 'left') { y += rect.height/2; }
      if (edge === 'right') { x += rect.width; y += rect.height/2; }
      return {x, y};
    }
    
    function drawLine(p1, p2, isFlowReverse = false) {
      const yMid = p1.y + (p2.y - p1.y) / 2;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      
      // Use bezier curves for a smooth organic "AI" look
      const d = `M ${p1.x} ${p1.y} C ${p1.x} ${yMid}, ${p2.x} ${yMid}, ${p2.x} ${p2.y}`;
      path.setAttribute('d', d);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', '#153243');
      path.setAttribute('stroke-width', '4');
      path.setAttribute('stroke-linecap', 'round');
      svg.appendChild(path);
      
      // Animated flow line on top
      const flowPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      flowPath.setAttribute('d', d);
      flowPath.setAttribute('fill', 'none');
      flowPath.setAttribute('stroke', '#3AE2CE');
      flowPath.setAttribute('stroke-width', '2');
      flowPath.setAttribute('stroke-linecap', 'round');
      flowPath.setAttribute('class', 'flow-line');
      if (isFlowReverse) {
        flowPath.style.animationDirection = 'reverse';
      }
      svg.appendChild(flowPath);
      
      // Node connection dot at p2
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', p2.x);
      circle.setAttribute('cy', p2.y);
      circle.setAttribute('r', '5');
      circle.setAttribute('fill', '#3AE2CE');
      svg.appendChild(circle);
      
      // Node connection dot at p1
      const circle2 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle2.setAttribute('cx', p1.x);
      circle2.setAttribute('cy', p1.y);
      circle2.setAttribute('r', '5');
      circle2.setAttribute('fill', '#3AE2CE');
      svg.appendChild(circle2);
    }

    // Connections
    // AZAL points down to DX
    drawLine(getPt('node-azal', 'bottom'), getPt('node-dx', 'top'));
    
    // DX to Smart Route (Reverse flow visually to make it look like DX is sending data to SR)
    drawLine(getPt('node-sr', 'bottom'), getPt('node-dx', 'top'), true);
    
    // DX to eSIM
    drawLine(getPt('node-esim', 'bottom'), getPt('node-dx', 'top'), true);
    
    // DX to Tracing Intelligence
    drawLine(getPt('node-dx', 'bottom'), getPt('node-ti', 'top'));
    
    // DX to Wallet
    drawLine(getPt('node-dx', 'bottom'), getPt('node-wallet', 'top'));
  }

  window.addEventListener('resize', drawLines);
  setTimeout(drawLines, 100);
  window.addEventListener('load', drawLines);
</script>
</body>
</html>
