<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZAL Flights · AZCON DirectX</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #061014; --panel: rgba(11,29,38,0.7);
  --accent: #3AE2CE; --accent2: #FF6B2B; --gold: #F0B429;
  --white: #fff; --ink2: #8EA7B4; --ink3: #5C7A8B;
  --border: rgba(255,255,255,0.06);
  --f-disp: 'Bebas Neue',sans-serif;
  --f-mono: 'Space Mono',monospace;
  --f-body: 'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--f-body);background:radial-gradient(circle at 40% 30%,#0F2A36,var(--bg) 70%);color:var(--white);display:flex}

/* SIDEBAR */
aside{width:240px;min-width:240px;background:rgba(6,16,20,.9);backdrop-filter:blur(20px);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 20px}
.logo{font-family:var(--f-body);font-weight:700;font-size:26px;letter-spacing:-0.02em;margin-bottom:28px;cursor:pointer}
.logo span{color:var(--accent)}
.nav-item{padding:11px 16px;margin-bottom:6px;border-radius:10px;color:var(--ink2);font-weight:500;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:.2s}
.nav-item svg{width:16px;height:16px;opacity:.7;flex-shrink:0}
.nav-item:hover{background:rgba(58,226,206,.08);color:var(--accent)}
.nav-item.active{background:rgba(58,226,206,.12);color:var(--accent);border:1px solid rgba(58,226,206,.2)}
.nav-item.active svg{opacity:1}
.sign-out{color:var(--accent2)!important;margin-top:auto}

/* MAIN */
main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:28px 36px}
.top-bar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-shrink:0}
.page-eyebrow{font-family:var(--f-mono);font-size:11px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
.page-title{font-family:var(--f-disp);font-size:38px;letter-spacing:.04em}
.airport-badge{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 18px;text-align:right;backdrop-filter:blur(10px)}
.airport-code{font-family:var(--f-disp);font-size:32px;color:var(--accent)}
.airport-name{font-size:11px;color:var(--ink3);margin-top:2px}

/* DELAY BANNER */
#delay-banner{display:none;background:rgba(240,180,41,.12);border:1px solid rgba(240,180,41,.4);border-radius:12px;padding:12px 20px;margin-bottom:14px;flex-shrink:0}
#delay-banner.show{display:flex;align-items:flex-start;gap:14px}
.delay-icon{font-size:20px;margin-top:1px}
.delay-title{font-weight:600;color:var(--gold);font-size:14px;margin-bottom:4px}
.delay-text{font-size:13px;color:var(--ink2);line-height:1.5}
.delay-tips{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.delay-tip{background:rgba(240,180,41,.1);border:1px solid rgba(240,180,41,.2);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--gold)}

/* TOGGLE */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.toggle-wrap{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:3px}
.toggle-btn{padding:7px 20px;border-radius:6px;border:none;background:transparent;color:var(--ink2);font-family:var(--f-body);font-weight:500;font-size:13px;cursor:pointer;transition:.2s}
.toggle-btn.active{background:rgba(58,226,206,.15);color:var(--accent)}
.refresh-btn{background:transparent;border:1px solid var(--border);color:var(--ink2);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;transition:.2s;font-family:var(--f-body);display:flex;align-items:center;gap:6px}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
.spin{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* FLIGHT TABLE */
.table-wrap{overflow:auto;flex:1;min-height:0;border-radius:14px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:rgba(255,255,255,.03);border-bottom:1px solid var(--border)}
thead th{padding:11px 14px;text-align:left;font-family:var(--f-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:.15s;cursor:pointer}
tbody tr:hover{background:rgba(58,226,206,.04)}
tbody td{padding:12px 14px;color:var(--ink2);white-space:nowrap}
tbody td:first-child{color:var(--white);font-weight:600;font-family:var(--f-mono);font-size:12px}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.b-scheduled{background:rgba(142,167,180,.12);color:var(--ink2);border:1px solid rgba(142,167,180,.2)}
.b-active{background:rgba(58,226,206,.12);color:var(--accent);border:1px solid rgba(58,226,206,.25)}
.b-landed{background:rgba(16,185,129,.12);color:#10B981;border:1px solid rgba(16,185,129,.25)}
.b-delayed{background:rgba(240,180,41,.12);color:var(--gold);border:1px solid rgba(240,180,41,.25)}
.b-cancelled{background:rgba(255,107,43,.12);color:var(--accent2);border:1px solid rgba(255,107,43,.25)}
.b-diverted{background:rgba(139,92,246,.12);color:#A78BFA;border:1px solid rgba(139,92,246,.25)}

/* SEARCH SECTION */
.search-section{margin-top:18px;flex-shrink:0}
.search-label{font-family:var(--f-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
.search-row{display:flex;gap:10px}
#flight-input{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:11px 16px;color:var(--white);font-family:var(--f-mono);font-size:14px;outline:none;transition:.2s;backdrop-filter:blur(8px)}
#flight-input::placeholder{color:var(--ink3)}
#flight-input:focus{border-color:rgba(58,226,206,.4);box-shadow:0 0 0 3px rgba(58,226,206,.08)}
#search-btn{background:var(--accent);color:#061014;border:none;border-radius:10px;padding:11px 24px;font-weight:700;font-size:14px;cursor:pointer;transition:.2s;white-space:nowrap}
#search-btn:hover{background:#2dcfbb}

/* FLIGHT DETAIL CARD */
#flight-detail{display:none;margin-top:14px;background:var(--panel);border:1px solid rgba(58,226,206,.2);border-radius:16px;padding:20px 24px;backdrop-filter:blur(12px)}
#flight-detail.show{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px}
.detail-field .label{font-family:var(--f-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.detail-field .value{font-size:15px;font-weight:600;color:var(--white)}
.detail-field .value.accent{color:var(--accent)}

/* LOADING / EMPTY */
.state-msg{padding:40px;text-align:center;color:var(--ink3);font-size:13px}
.loader{display:inline-block;width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
</style>
</head>
<body>

<aside>
  <div class="logo" onclick="location.href='azcon-one.html'">Direct<span>X</span></div>
  <div class="nav-item" onclick="location.href='azcon-one.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Ecosystem
  </div>
  <div class="nav-item" onclick="location.href='azcon-one.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
    Smart Route
  </div>
  <div class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 19-7z"/></svg>
    Transit &amp; Flights
  </div>
  <div class="nav-item" onclick="location.href='esim.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/></svg>
    eSIM Services
  </div>
  <div class="nav-item" onclick="location.href='wallet.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg>
    Unified Wallet
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    Tracing Intelligence
  </div>
  <div class="nav-item sign-out" style="margin-top:auto">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Sign Out
  </div>
</aside>

<main>
  <!-- Header -->
  <div class="top-bar">
    <div>
      <div class="page-eyebrow">AZAL · Live Flight Data</div>
      <div class="page-title">Flight Board</div>
    </div>
    <div class="airport-badge">
      <div class="airport-code">GYD</div>
      <div class="airport-name">Heydar Aliyev Int'l · Baku</div>
    </div>
  </div>

  <!-- Delay Banner -->
  <div id="delay-banner">
    <div class="delay-icon">⚠️</div>
    <div>
      <div class="delay-title" id="delay-title">Delay Detected</div>
      <div class="delay-text" id="delay-text"></div>
      <div class="delay-tips">
        <span class="delay-tip">🛋️ Use the lounge</span>
        <span class="delay-tip">📶 eSIM stays active</span>
        <span class="delay-tip">🗺️ Update via Smart Route</span>
      </div>
    </div>
  </div>

  <!-- Toggle + Refresh -->
  <div class="section-head">
    <div class="toggle-wrap">
      <button class="toggle-btn active" id="btn-dep" onclick="switchTab('departures')">✈ Departures</button>
      <button class="toggle-btn" id="btn-arr" onclick="switchTab('arrivals')">🛬 Arrivals</button>
    </div>
    <button class="refresh-btn" onclick="loadFlights()">
      <span id="refresh-icon">↻</span> Refresh
    </button>
  </div>

  <!-- Table -->
  <div class="table-wrap" id="table-wrap">
    <div class="state-msg"><div class="loader"></div><br>Loading flights…</div>
  </div>

  <!-- Search -->
  <div class="search-section">
    <div class="search-label">Flight Details Search</div>
    <div class="search-row">
      <input type="text" id="flight-input" placeholder="e.g. J2123 or J2 123" maxlength="10" onkeydown="if(event.key==='Enter')searchFlight()">
      <button id="search-btn" onclick="searchFlight()">Search Flight</button>
    </div>
    <div id="flight-detail"></div>
  </div>
</main>

<script>
const API = '/api/flights';
let currentTab = 'departures';
let allFlights = [];

// ── Status badge ──────────────────────────────────
function badge(status) {
  const cls = { scheduled:'b-scheduled', active:'b-active', landed:'b-landed',
                delayed:'b-delayed', cancelled:'b-cancelled', diverted:'b-diverted' };
  return `<span class="badge ${cls[status]||'b-scheduled'}">${status}</span>`;
}

// ── Format time ────────────────────────────────────
function fmtTime(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
  catch { return '—'; }
}

// ── Render table ───────────────────────────────────
function renderTable(flights) {
  const isDep = currentTab === 'departures';
  if (!flights.length) {
    document.getElementById('table-wrap').innerHTML =
      '<div class="state-msg">No flights found.</div>';
    return;
  }
  const rows = flights.map(f => {
    const dest = isDep
      ? `<b>${f.destination?.iata||'—'}</b> <span style="color:var(--ink3);font-size:12px">${f.destination?.airport||''}</span>`
      : `<b>${f.origin?.iata||'—'}</b> <span style="color:var(--ink3);font-size:12px">${f.origin?.airport||''}</span>`;
    const delayStr = f.delay > 0 ? `<span style="color:var(--gold);font-size:11px"> +${f.delay}m</span>` : '';
    const row = `<tr onclick="fillSearch('${f.flightNumber}')">
      <td>${f.flightNumber}</td>
      <td>${f.airline}</td>
      <td>${dest}</td>
      <td>${fmtTime(f.scheduled)}${delayStr}</td>
      <td>${badge(f.delayed?'delayed':f.status)}</td>
      <td style="color:var(--ink3)">${f.gate}</td>
    </tr>`;
    return row;
  }).join('');

  const head = isDep
    ? `<th>Flight</th><th>Airline</th><th>Destination</th><th>Sched.</th><th>Status</th><th>Gate</th>`
    : `<th>Flight</th><th>Airline</th><th>Origin</th><th>Sched.</th><th>Status</th><th>Gate</th>`;

  document.getElementById('table-wrap').innerHTML =
    `<table><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table>`;
}

// ── Delay banner ───────────────────────────────────
function checkDelays(flights) {
  const delayed = flights.filter(f => f.delayed && f.delay >= 15);
  const banner = document.getElementById('delay-banner');
  if (!delayed.length) { banner.classList.remove('show'); return; }
  const worst = delayed.sort((a,b) => b.delay - a.delay)[0];
  document.getElementById('delay-title').textContent =
    `Flight ${worst.flightNumber} delayed by ${worst.delay} minutes`;
  document.getElementById('delay-text').textContent =
    `${delayed.length} flight${delayed.length>1?'s':''} affected at GYD — plan accordingly.`;
  banner.classList.add('show');
}

// ── Load flights ───────────────────────────────────
async function loadFlights() {
  document.getElementById('table-wrap').innerHTML =
    '<div class="state-msg"><div class="loader"></div><br>Fetching live data…</div>';
  document.getElementById('delay-banner').classList.remove('show');
  const icon = document.getElementById('refresh-icon');
  icon.className = 'spin'; icon.textContent = '↻';

  try {
    const res = await fetch(`${API}/${currentTab}`);
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'API error');
    allFlights = json.flights || [];
    renderTable(allFlights);
    checkDelays(allFlights);
  } catch (err) {
    document.getElementById('table-wrap').innerHTML =
      `<div class="state-msg">⚠️ ${err.message}<br><small>API is unavailable. Check the deployment logs and AVIATIONSTACK_API_KEY.</small></div>`;
  } finally {
    icon.className = ''; icon.textContent = '↻';
  }
}

// ── Tab switch ─────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('btn-dep').classList.toggle('active', tab==='departures');
  document.getElementById('btn-arr').classList.toggle('active', tab==='arrivals');
  document.getElementById('flight-detail').className = '';
  loadFlights();
}

// ── Fill search on row click ───────────────────────
function fillSearch(num) {
  document.getElementById('flight-input').value = num;
  searchFlight();
}

// ── Flight search ──────────────────────────────────
async function searchFlight() {
  const raw = document.getElementById('flight-input').value.trim();
  if (!raw) return;
  const card = document.getElementById('flight-detail');
  card.className = '';
  card.innerHTML = '<div style="color:var(--ink3);font-size:13px">Searching…</div>';
  card.classList.add('show');

  try {
    const res = await fetch(`${API}/search?flight=${encodeURIComponent(raw)}`);
    const f = await res.json();
    if (!res.ok) throw new Error(f.error || 'Not found');

    // Show delay banner for searched flight
    if (f.delayed) {
      document.getElementById('delay-title').textContent =
        `Flight ${f.flightNumber} delayed by ${f.delay} minutes`;
      document.getElementById('delay-text').textContent =
        `Please allow extra time and stay connected via eSIM.`;
      document.getElementById('delay-banner').classList.add('show');
    }

    card.className = 'show';
    card.innerHTML = `
      <div class="detail-field"><div class="label">Flight</div><div class="value accent">${f.flightNumber}</div></div>
      <div class="detail-field"><div class="label">Airline</div><div class="value">${f.airline}</div></div>
      <div class="detail-field"><div class="label">Status</div><div class="value">${badge(f.delayed?'delayed':f.status)}</div></div>
      <div class="detail-field"><div class="label">Delay</div><div class="value" style="color:${f.delay>0?'var(--gold)':'var(--accent)'}">${f.delay > 0 ? '+'+f.delay+' min' : 'On time'}</div></div>
      <div class="detail-field"><div class="label">Gate</div><div class="value">${f.gate}</div></div>
      <div class="detail-field"><div class="label">Baggage Belt</div><div class="value">${f.baggage}</div></div>
      <div class="detail-field"><div class="label">Terminal</div><div class="value">${f.terminal}</div></div>
      <div class="detail-field"><div class="label">Scheduled</div><div class="value">${fmtTime(f.scheduled)}</div></div>
    `;
  } catch(err) {
    card.className = 'show';
    card.innerHTML = `<div style="color:var(--accent2);font-size:13px">⚠️ ${err.message}</div>`;
  }
}

// ── Init ───────────────────────────────────────────
loadFlights();
</script>
</body>
</html>
