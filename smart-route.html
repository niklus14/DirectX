<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Route · AZCON</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<!-- Mapbox GL JS -->
<script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --sky: #0B1D26;
    --sky-mid: #153243;
    --sky-deep: #1F455A;
    --ink: #FFFFFF;
    --ink-2: #8EA7B4;
    --ink-3: #5C7A8B;
    --accent: #3AE2CE;
    --accent-2: #FF6B2B;
    --dark-bg: #061014;
    --panel-bg: rgba(6, 16, 20, 0.85);
    --font-disp: 'Bebas Neue', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }
  
  body {
    margin: 0; padding: 0;
    font-family: var(--font-body);
    background-color: var(--dark-bg);
    color: var(--ink);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }
  
  /* Sidebar for Controls and AI */
  .panel {
    width: 450px;
    background: var(--panel-bg);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    z-index: 10;
    box-shadow: 4px 0 20px rgba(0,0,0,0.5);
  }
  
  .header {
    padding: 24px 30px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--ink-2); font-weight: 500; font-size: 13px;
    text-decoration: none; margin-bottom: 16px;
    transition: color 0.3s;
  }
  .back-btn:hover { color: var(--accent); }
  .back-btn svg { width: 16px; height: 16px; }
  
  .title {
    font-family: var(--font-disp);
    font-size: 32px;
    letter-spacing: 0.04em;
    color: var(--ink);
    margin: 0;
  }
  
  .input-section {
    padding: 24px 30px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  
  .input-group {
    margin-bottom: 16px;
  }
  .input-group label {
    display: block;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .input-group input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--white);
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .input-group input:focus {
    border-color: var(--accent);
  }
  
  .analyze-btn {
    width: 100%;
    background: var(--accent);
    color: #061014;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex; justify-content: center; align-items: center; gap: 8px;
  }
  .analyze-btn:hover { background: #4AFFE9; }
  .analyze-btn:active { transform: scale(0.98); }
  .analyze-btn:disabled {
    background: rgba(255,255,255,0.1);
    color: var(--ink-3);
    cursor: not-allowed;
    transform: none;
  }
  
  .analyze-btn.loading {
    background: rgba(255,255,255,0.1);
    color: var(--ink-3);
    cursor: not-allowed;
  }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { 100% { transform: rotate(360deg); } }
  
  /* AI Results Area */
  .results-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 30px;
  }
  .results-area::-webkit-scrollbar { width: 6px; }
  .results-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
  
  .ai-bubble {
    background: rgba(58, 226, 206, 0.05);
    border: 1px solid rgba(58, 226, 206, 0.15);
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink);
    display: none; /* hidden initially */
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  
  .ai-bubble h1, .ai-bubble h2, .ai-bubble h3 { font-family: var(--font-disp); color: var(--accent); letter-spacing: 0.05em; margin-top:0; margin-bottom: 12px; }
  .ai-bubble p { margin-bottom: 12px; }
  .ai-bubble p:last-child { margin-bottom: 0; }
  .ai-bubble ul { margin-left: 20px; margin-bottom: 12px; }
  .ai-bubble li { margin-bottom: 6px; }
  
  .ai-header {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--accent); letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 12px;
    padding-bottom: 12px; border-bottom: 1px solid rgba(58, 226, 206, 0.1);
  }
  .ai-header svg { width: 16px; height: 16px; }
  
  /* Map Area */
  .map-container {
    flex: 1;
    position: relative;
  }
  #map {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  }
  
  /* Overlay gradients for the map to blend nicely */
  .map-overlay {
    position: absolute; inset: 0;
    pointer-events: none;
    box-shadow: inset 40px 0 100px var(--dark-bg);
    z-index: 5;
  }
</style>
</head>
<body>

<div class="panel">
  <div class="header">
    <a href="azcon-one.html" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Back to Ecosystem
    </a>
    <h1 class="title">Smart Route</h1>
  </div>
  
  <div class="input-section">
    <div class="input-group">
      <label>Origin</label>
      <input type="text" id="origin" placeholder="e.g. Heydar Aliyev Airport" value="Heydar Aliyev Airport, Baku" />
    </div>
    <div class="input-group">
      <label>Destination</label>
      <input type="text" id="dest" placeholder="e.g. Flame Towers" value="Flame Towers, Baku" />
    </div>
    <button class="analyze-btn loading" id="analyze-btn" onclick="analyzeRoute()" disabled>
      <span class="spin">↻</span>
      Loading Map
    </button>
  </div>
  
  <div class="results-area" id="results-area">
    <!-- Default message -->
    <div style="text-align:center; padding: 40px 20px; color: var(--ink-3); font-size: 13px;" id="idle-msg">
      Enter your route details to fetch Mapbox paths, Waze traffic, and You.com context analyzed by DirectX AI.
    </div>
    
    <!-- AI Bubble -->
    <div class="ai-bubble" id="ai-bubble">
      <div class="ai-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 12L2.5 7.5"/><path d="M12 12l9.5-4.5"/><path d="M12 12v10"/></svg>
        DirectX AI Analysis
      </div>
      <div id="ai-content"></div>
    </div>
  </div>
</div>

<div class="map-container">
  <div id="map"></div>
  <div class="map-overlay"></div>
</div>

<script>
  const analyzeButtonContent = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg> Analyze Intelligence`;

  let map = null;

  // Markers
  let originMarker = null;
  let destMarker = null;

  async function initializeMapbox() {
    const btn = document.getElementById('analyze-btn');
    const idleMsg = document.getElementById('idle-msg');

    try {
      const res = await fetch('/api/smartroute/config');
      const config = await res.json();

      if (!res.ok || !config.mapboxAccessToken) {
        throw new Error(config.error || 'Mapbox token is missing.');
      }

      mapboxgl.accessToken = config.mapboxAccessToken;

      map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/dark-v11',
        center: [49.8671, 40.4093], // Baku center
        zoom: 11,
        pitch: 45
      });

      map.on('load', () => {
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.innerHTML = analyzeButtonContent;
      });
    } catch (error) {
      btn.disabled = true;
      btn.classList.add('loading');
      btn.innerHTML = 'Map Unavailable';
      idleMsg.innerHTML = `Mapbox is not configured. Add MAPBOX_API_KEY to backend/.env and restart the server.`;
      console.error(error);
    }
  }

  async function getCoordinates(query) {
    // Append 'Baku' if it's not already in the query to ensure accurate results
    const searchQuery = query.toLowerCase().includes('baku') ? query : `${query}, Baku`;
    const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(searchQuery)}.json?access_token=${mapboxgl.accessToken}&limit=1&proximity=49.8671,40.4093&country=az`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.features && data.features.length > 0) {
      return data.features[0].center; // [lng, lat]
    }
    throw new Error(`Location not found: ${query}`);
  }

  async function getRoute(coord1, coord2) {
    const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${coord1[0]},${coord1[1]};${coord2[0]},${coord2[1]}?geometries=geojson&access_token=${mapboxgl.accessToken}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.routes && data.routes.length > 0) {
      return data.routes[0];
    }
    throw new Error('Could not calculate route.');
  }

  function drawRouteLine(geojson) {
    const geojsonFeature = {
      type: 'FeatureCollection',
      features: [{
        type: 'Feature',
        properties: {},
        geometry: geojson
      }]
    };

    if (map.getSource('route')) {
      map.getSource('route').setData(geojsonFeature);
    } else {
      map.addSource('route', {
        type: 'geojson',
        data: geojsonFeature
      });
      map.addLayer({
        id: 'route',
        type: 'line',
        source: 'route',
        layout: {
          'line-join': 'round',
          'line-cap': 'round'
        },
        paint: {
          'line-color': '#3AE2CE',
          'line-width': 6,
          'line-opacity': 0.8
        }
      });
    }
  }

  let hazardMarker = null;

  function placeHazardMarker(hazard) {
    if (hazardMarker) hazardMarker.remove();
    if (!hazard) return;

    // Create a custom DOM element for the hazard marker
    const el = document.createElement('div');
    el.innerHTML = '⚠️';
    el.style.fontSize = '24px';
    el.style.filter = 'drop-shadow(0 2px 4px rgba(0,0,0,0.8))';
    el.style.cursor = 'pointer';

    // Add popup
    const popup = new mapboxgl.Popup({ offset: 25 }).setHTML(
      `<div style="color:#000; font-family:'DM Sans',sans-serif; padding:4px;">
        <strong style="color:#FF6B2B; font-size:14px;">${hazard.title}</strong>
        <p style="margin:4px 0 0; font-size:12px;">${hazard.desc}</p>
      </div>`
    );

    hazardMarker = new mapboxgl.Marker(el)
      .setLngLat([hazard.lng, hazard.lat])
      .setPopup(popup)
      .addTo(map);
  }

  async function analyzeRoute() {
    const btn = document.getElementById('analyze-btn');
    const originStr = document.getElementById('origin').value.trim();
    const destStr = document.getElementById('dest').value.trim();
    const idleMsg = document.getElementById('idle-msg');
    const aiBubble = document.getElementById('ai-bubble');
    const aiContent = document.getElementById('ai-content');

    if (!originStr || !destStr) return;
    if (!map) {
      aiBubble.style.display = 'block';
      aiContent.innerHTML = `<div style="color:#FF6B2B;">Mapbox is not initialized yet.</div>`;
      return;
    }

    // UI Loading state
    btn.classList.add('loading');
    btn.innerHTML = `<span class="spin">↻</span> Processing...`;
    idleMsg.style.display = 'none';
    aiBubble.style.display = 'block';
    aiContent.innerHTML = `<div style="color:var(--ink-2); text-align:center;">Fetching map coordinates...</div>`;

    try {
      // 1. Get Coordinates
      const originCoords = await getCoordinates(originStr);
      const destCoords = await getCoordinates(destStr);

      // Update Map Markers
      if (originMarker) originMarker.remove();
      if (destMarker) destMarker.remove();
      originMarker = new mapboxgl.Marker({ color: '#FF6B2B' }).setLngLat(originCoords).addTo(map);
      destMarker = new mapboxgl.Marker({ color: '#3AE2CE' }).setLngLat(destCoords).addTo(map);

      // 2. Get Route from Mapbox
      aiContent.innerHTML = `<div style="color:var(--ink-2); text-align:center;">Calculating directions...</div>`;
      const routeData = await getRoute(originCoords, destCoords);
      
      // Draw Route
      drawRouteLine(routeData.geometry);

      // Fit map to route bounds
      const coordinates = routeData.geometry.coordinates;
      const bounds = coordinates.reduce(function (bounds, coord) {
        return bounds.extend(coord);
      }, new mapboxgl.LngLatBounds(coordinates[0], coordinates[0]));
      map.fitBounds(bounds, { padding: 80 });

      const distanceKm = (routeData.distance / 1000).toFixed(1) + ' km';
      const durationMin = Math.round(routeData.duration / 60) + ' mins';

      // 3. Post to our backend to hit Groq/You.com/Waze Mock
      aiContent.innerHTML = `<div style="color:var(--ink-2); text-align:center;">Analyzing traffic and hazards...</div>`;
      
      const backendRes = await fetch('/api/smartroute/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          origin: originStr,
          destination: destStr,
          distance: distanceKm,
          duration: durationMin,
          coordinates: coordinates // Pass coordinates so backend can pick a hazard spot
        })
      });

      const backendData = await backendRes.json();
      
      if (!backendRes.ok) {
        throw new Error(backendData.error || 'Backend analysis failed.');
      }

      // Display Final AI Response using marked.js
      aiContent.innerHTML = marked.parse(backendData.analysis);

      // Place Hazard Marker on Map if returned
      placeHazardMarker(backendData.hazard);

    } catch (error) {
      aiContent.innerHTML = `<div style="color:#FF6B2B;">⚠️ Error: ${error.message}</div>`;
      console.error(error);
    } finally {
      btn.classList.remove('loading');
      btn.innerHTML = analyzeButtonContent;
    }
  }

  initializeMapbox();
</script>
</body>
</html>
